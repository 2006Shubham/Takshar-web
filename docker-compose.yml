networks:
  takshar_net:

services:
  takshar_mongo:
    image: mongo:latest # Using latest to prevent the version crash from earlier
    container_name: takshar_mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: strongpassword
      MONGO_INITDB_DATABASE: takshar_db
    volumes:
      - takshar_mongo_data:/data/db
    ports:
      - "27018:27017" # THIS is what allows Compass to see the data!
    networks:
      - takshar_net

  takshar_backend:
    build: ./backend
    container_name: takshar_backend
    env_file:
      - ./backend/.env
    environment:
      # Pointing back to the Docker container, not your local machine
      - MONGODB_URI=mongodb://admin:strongpassword@takshar_mongo:27017/takshar_db?authSource=admin
    ports:
      - "5000:5000"
    depends_on:
      - takshar_mongo
    networks:
      - takshar_net

  takshar_frontend:
    build: ./frontend
    container_name: takshar_frontend
    ports:
      - "8080:80"
    depends_on:
      - takshar_backend
    networks:
      - takshar_net

volumes:
  takshar_mongo_data: